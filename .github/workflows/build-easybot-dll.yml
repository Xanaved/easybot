name: Build EasyBot DLL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      VCPKG_DEFAULT_BINARY_CACHE: C:\Users\runneradmin\AppData\Local\vcpkg\archives

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: s
          submodules: recursive

      - name: Setup MSVC x86
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Prepare short workspace path
        shell: pwsh
        run: |
          subst B: "$env:GITHUB_WORKSPACE\s"
          New-Item -ItemType Directory -Force -Path "C:\Users\runneradmin\AppData\Local\vcpkg\archives" | Out-Null
          New-Item -ItemType Directory -Force -Path "B:\third_party\vcpkg\downloads" | Out-Null
          "EASYBOT_ROOT=B:\" | Out-File -FilePath $env:GITHUB_ENV -Encoding ascii -Append

      - name: Restore vcpkg archives cache
        id: cache-vcpkg-archives
        uses: actions/cache/restore@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-archives-${{ runner.os }}-x86-static-${{ hashFiles('s/vcpkg.json', 's/CMakeLists.txt') }}
          restore-keys: |
            vcpkg-archives-${{ runner.os }}-x86-static-

      - name: Restore vcpkg downloads cache
        id: cache-vcpkg-downloads
        uses: actions/cache/restore@v4
        with:
          path: B:\third_party\vcpkg\downloads
          key: vcpkg-downloads-${{ runner.os }}-x86-static-${{ hashFiles('s/vcpkg.json', 's/CMakeLists.txt') }}
          restore-keys: |
            vcpkg-downloads-${{ runner.os }}-x86-static-

      - name: Show tool versions
        shell: pwsh
        run: |
          cmake --version
          ninja --version

      - name: Configure
        shell: pwsh
        working-directory: B:\
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: 2
        run: |
          cmake -S . -B build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DVCPKG_BUILD_TYPE=release

      - name: Build EasyBotDLL
        shell: pwsh
        working-directory: B:\
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: 2
        run: |
          cmake --build build --target EasyBotDLL

      - name: Collect artifacts
        shell: pwsh
        working-directory: B:\
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null

          $dllPath = "B:\Bot\EasyBot.dll"
          if (!(Test-Path $dllPath)) {
            throw "Expected DLL not found at $dllPath"
          }

          Copy-Item $dllPath -Destination "B:\artifact\EasyBot.dll" -Force

          $pdbPath = "B:\Bot\EasyBot.pdb"
          if (Test-Path $pdbPath) {
            Copy-Item $pdbPath -Destination "B:\artifact\EasyBot.pdb" -Force
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: easybot-dll-win32
          path: B:\artifact
          if-no-files-found: error

      - name: Save vcpkg archives cache
        if: always() && steps.cache-vcpkg-archives.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: ${{ steps.cache-vcpkg-archives.outputs.cache-primary-key }}

      - name: Save vcpkg downloads cache
        if: always() && steps.cache-vcpkg-downloads.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: B:\third_party\vcpkg\downloads
          key: ${{ steps.cache-vcpkg-downloads.outputs.cache-primary-key }}
